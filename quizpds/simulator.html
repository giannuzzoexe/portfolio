<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Esame</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333333;
            --muted: #666666;
            --border: #e0e0e0;
            --radius: 14px;
            --tap-size: 48px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 16px;
            color: var(--text);
        }

        #app {
            width: min(100%, 820px);
            margin: 0 auto;
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .top-actions {
            position: sticky;
            top: 0;
            z-index: 20;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 8px;
            margin: -8px -8px 16px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #eeeeee;
        }

        .home-btn {
            min-height: 40px;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
        }

        .timer-box {
            display: none;
            justify-self: center;
            width: 100%;
            max-width: 170px;
            background: #e8f0fe;
            color: #174ea6;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 800;
            white-space: nowrap;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .auto-advance-control {
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #555;
            font-size: 0.9em;
            font-weight: 700;
            user-select: none;
            background: #f8f9fa;
            border: 1px solid #eeeeee;
            border-radius: 999px;
            padding: 8px 11px;
            white-space: nowrap;
        }

        .auto-advance-control input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0;
        }

        .timer-box.warning {
            background: #fff3cd;
            color: #664d03;
        }

        .timer-box.danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.82em;
            font-weight: 800;
            margin-bottom: 0;
            text-transform: uppercase;
            line-height: 1;
        }


        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            line-height: 1;
        }

        .live-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
            line-height: 1;
        }

        .score-pill {
            min-width: 30px;
            height: 26px;
            padding: 0 9px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 900;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            border: 1px solid transparent;
        }

        .correct-pill {
            background: #dff3e6;
            color: #1f7a3a;
            border-color: #b9e4c8;
        }

        .wrong-pill {
            background: #f8dddd;
            color: #9b2c2c;
            border-color: #efb8b8;
        }

        .question {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            margin-bottom: 18px;
            font-weight: 650;
            line-height: 1.35;
        }

        .options button {
            width: 100%;
            min-height: var(--tap-size);
            text-align: left;
            background: #f8f9fa;
            border: 2px solid var(--border);
            padding: 15px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.35;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.08s;
        }

        .options button:hover:not(:disabled) {
            background: #e8f0fe;
            border-color: var(--primary);
        }

        .options button:active:not(:disabled) {
            transform: scale(0.99);
        }

        .options button:disabled {
            cursor: not-allowed;
        }

        .correct {
            background: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
            font-weight: bold;
        }

        .wrong {
            background: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        #explanation {
            margin-top: 15px;
            padding: 14px 15px;
            border-left: 5px solid #ffc107;
            background: #fff3cd;
            display: none;
            font-size: 0.95em;
            line-height: 1.45;
            border-radius: 8px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            border-top: 1px solid #eee;
            padding-top: 18px;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.action-btn {
            border: none;
            min-height: var(--tap-size);
            padding: 12px 18px;
            font-size: 1em;
            border-radius: 12px;
            cursor: pointer;
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
        }

        button.primary-btn:hover {
            background: var(--primary-dark);
        }

        button.secondary-btn {
            background: #e8eaed;
            color: #333;
        }

        button.secondary-btn:hover:not(:disabled) {
            background: #dadce0;
        }

        button.secondary-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #progress {
            font-weight: bold;
            color: #666;
        }

        #quiz-screen,
        #result-screen,
        #error-screen {
            display: none;
        }

        #result-screen,
        #error-screen {
            text-align: center;
        }


        .result-quiz-title {
            display: inline-block;
            max-width: 100%;
            margin: -4px 0 14px;
            padding: 9px 14px;
            background: #e8f0fe;
            color: #174ea6;
            border: 1px solid #c8dcfb;
            border-radius: 999px;
            font-weight: 900;
            font-size: 0.95rem;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .score {
            font-size: 3em;
            color: var(--primary);
            font-weight: bold;
            margin: 20px 0 8px;
        }

        .result-details {
            color: #666;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .time-result {
            color: #666;
            font-weight: 700;
            margin: -8px 0 22px;
        }

        .mistakes-summary {
            margin: 28px 0;
            text-align: left;
        }

        .mistakes-summary h2 {
            color: var(--primary);
            text-align: left;
            margin-bottom: 14px;
        }

        .topic-group {
            border-top: 1px solid #eee;
            padding-top: 18px;
            margin-top: 22px;
        }

        .topic-group h3 {
            margin: 0 0 12px;
            color: #333;
        }

        .mistake-card {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-left: 5px solid #dc3545;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            line-height: 1.45;
        }

        .mistake-question {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .answer-row {
            margin: 6px 0;
        }

        .answer-row strong {
            display: inline-block;
            min-width: 120px;
        }

        .given-answer {
            color: #721c24;
        }

        .correct-answer {
            color: #155724;
        }

        .mistake-explanation {
            margin-top: 10px;
            color: #555;
            font-size: 0.95em;
        }

        .perfect-result {
            background: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            font-weight: 700;
        }

        .error-box {
            text-align: left;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 16px;
            border-radius: 8px;
            line-height: 1.45;
            margin: 18px 0;
        }

        .error-box strong {
            display: block;
            margin-bottom: 6px;
        }


        .result-details {
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px;
        }

        .result-actions button {
            flex: 1;
        }

        .mistakes-summary {
            overflow-wrap: anywhere;
        }

        .mistake-card {
            overflow-wrap: anywhere;
        }

        @media (hover: none) {
            .options button:hover:not(:disabled) {
                background: #f8f9fa;
                border-color: var(--border);
            }

            button.primary-btn:hover {
                background: var(--primary);
            }

            button.secondary-btn:hover:not(:disabled) {
                background: #e8eaed;
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 0;
                background: white;
            }

            #app {
                width: 100%;
                min-height: 100dvh;
                padding: 16px;
                border-radius: 0;
                box-shadow: none;
            }

            h1 {
                font-size: 1.35rem;
                line-height: 1.25;
                margin-bottom: 14px;
            }

            .top-actions {
                grid-template-columns: auto 1fr auto;
                gap: 6px;
                margin: -8px -8px 14px;
                padding: 7px 8px;
            }

            .home-btn {
                min-height: 38px;
                padding: 8px 11px;
                font-size: 0.9rem;
            }

            .timer-box {
                max-width: none;
                min-height: 38px;
                padding: 8px 10px;
                font-size: 0.95rem;
            }

            .auto-advance-control {
                min-height: 38px;
                padding: 8px 10px;
                font-size: 0.9rem;
            }

            .auto-advance-control input {
                width: 17px;
                height: 17px;
            }


            .question-meta {
                gap: 8px;
                margin-bottom: 12px;
            }

            .live-score {
                gap: 4px;
            }

            .score-pill {
                min-width: 26px;
                height: 24px;
                padding: 0 7px;
                font-size: 0.72rem;
            }

            .score-pill {
                min-width: 28px;
                height: 25px;
                padding: 0 8px;
                font-size: 0.76rem;
            }

            .badge {
                max-width: 100%;
                white-space: normal;
                line-height: 1;
                text-align: center;
                min-height: 25px;
                margin-bottom: 0;
            }

            .question {
                font-size: 1.08rem;
                margin-bottom: 16px;
            }

            .options button {
                padding: 14px;
                margin-bottom: 10px;
                border-radius: 12px;
            }

            #explanation {
                font-size: 0.92rem;
            }

            .footer {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                margin-top: 20px;
                padding-top: 16px;
            }

            #progress {
                text-align: center;
                background: #f8f9fa;
                border-radius: 999px;
                padding: 10px;
            }


            .question-meta {
                gap: 6px;
            }

            .live-score {
                font-size: 0.76rem;
                padding: 6px 8px;
            }

            .nav-actions,
            .result-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            button.action-btn {
                width: 100%;
                padding: 13px 12px;
            }


            .result-quiz-title {
                font-size: 0.86rem;
                padding: 8px 12px;
                margin-bottom: 12px;
            }

            .score {
                font-size: 2.35rem;
                line-height: 1.1;
            }

            .result-details,
            .time-result {
                font-size: 0.95rem;
            }

            .mistakes-summary {
                margin: 22px 0;
            }

            .mistakes-summary h2 {
                font-size: 1.2rem;
                text-align: center;
            }

            .topic-group {
                padding-top: 16px;
                margin-top: 18px;
            }

            .topic-group h3 {
                font-size: 1.05rem;
            }

            .mistake-card {
                padding: 12px;
                border-radius: 12px;
            }

            .mistake-question {
                font-size: 0.98rem;
            }

            .answer-row strong {
                display: block;
                min-width: 0;
                margin-bottom: 2px;
            }
        }

        @media (max-width: 380px) {
            #app {
                padding: 12px;
            }

            .top-actions {
                margin: -6px -6px 12px;
                padding: 6px;
                gap: 5px;
            }

            .home-btn {
                padding: 7px 9px;
                font-size: 0.85rem;
            }

            .timer-box {
                font-size: 0.9rem;
                padding: 7px 8px;
            }

            .auto-advance-control {
                padding: 7px 8px;
                font-size: 0.85rem;
            }

            .nav-actions,
            .result-actions {
                grid-template-columns: 1fr;
            }

            .score {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="quiz-screen">
            <div class="top-actions">
                <button class="action-btn secondary-btn home-btn" onclick="goHome()"
                    title="Torna alla Home">Esci</button>
                <div class="timer-box" id="timer-box">Tempo: <span id="timer-value">60:00</span></div>
                <label class="auto-advance-control" for="auto-advance-toggle">
                    <input type="checkbox" id="auto-advance-toggle">
                    Auto
                </label>
            </div>

            <h1 id="quiz-title">Simulazione Esame</h1>
            <div class="question-meta">
                <div class="badge" id="topic-badge">Materia</div>
                <div class="live-score" aria-label="Conteggio risposte">
                    <span class="score-pill correct-pill" id="correct-count">0</span>
                    <span class="score-pill wrong-pill" id="wrong-count">0</span>
                </div>
            </div>
            <div class="question" id="question-text">Caricamento in corso...</div>
            <div class="options" id="options-container"></div>
            <div id="explanation"></div>

            <div class="footer">
                <span id="progress">Domanda 1</span>
                <div class="nav-actions">
                    <button class="action-btn secondary-btn" id="prev-btn" onclick="prevQuestion()">&#11013;
                        Indietro</button>
                    <button class="action-btn primary-btn" id="next-btn" onclick="nextQuestion()">Avanti
                        &#10140;</button>
                </div>
            </div>
        </div>

        <div id="result-screen">
            <h1 id="result-title">Simulazione conclusa!</h1>
            <div class="result-quiz-title" id="result-quiz-title">Simulazione Esame</div>
            <p id="result-subtitle">Ecco il tuo risultato:</p>
            <div class="score" id="final-score">0,00 / 0,00</div>
            <div class="result-details" id="result-details"></div>
            <div class="time-result" id="time-result"></div>
            <div class="mistakes-summary" id="mistakes-summary"></div>
            <div class="result-actions">
                <button class="action-btn primary-btn" onclick="location.reload()">Riprova</button>
                <button class="action-btn secondary-btn home-btn" onclick="goHome()"
                    title="Torna alla Home">Esci</button>
            </div>
        </div>

        <div id="error-screen">
            <h1>Simulazione non disponibile</h1>
            <div class="error-box" id="error-message"></div>
            <button class="action-btn secondary-btn home-btn" onclick="goHome()" title="Torna alla Home">Home</button>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentQ = 0;
        let answers = [];
        let quizTitle = "Simulatore Esame";
        let autoAdvanceTimer = null;
        let timerInterval = null;
        let isTimedQuiz = false;
        let remainingSeconds = 60 * 60;

        const allowedTypes = ["full", "cp", "cpp", "cds"];
        const AUTO_ADVANCE_DELAY = 600;
        const DEFAULT_TIMED_SECONDS = 60 * 60;
        const POINTS_PER_CORRECT_ANSWER = 0.50;
        const AUTO_ADVANCE_STORAGE_KEY = "simulator_auto_advance_enabled";

        class AppError extends Error {
            constructor(title, description) {
                super(description);
                this.title = title;
                this.description = description;
            }
        }

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get("type");
            const id = params.get("id");
            const timed = params.has("timed");

            if (!type || !id) {
                throw new AppError(
                    "Errore",
                    "Impossibile trovare il quiz. Torna alla home e seleziona una batteria dall'elenco."
                );
            }

            if (!allowedTypes.includes(type) || !/^\d+$/.test(id)) {
                throw new AppError(
                    "Link del quiz non valido",
                    "Il collegamento usato non corrisponde a una batteria disponibile. Torna alla home e scegli nuovamente il quiz."
                );
            }

            return { type, id, timed };
        }

        async function loadQuizFromJson() {
            try {
                const { type, id, timed } = getParams();
                isTimedQuiz = timed;
                remainingSeconds = DEFAULT_TIMED_SECONDS;
                const jsonPath = `${type}/${id}.json`;
                const response = await fetch(jsonPath, { cache: "no-store" });

                if (!response.ok) {
                    throw new AppError(
                        "Batteria non trovata",
                        "Questa batteria quiz non è disponibile. Potrebbe essere stata spostata, rinominata o non ancora caricata."
                    );
                }

                let payload;

                try {
                    payload = await response.json();
                } catch {
                    throw new AppError(
                        "Batteria non leggibile",
                        "Il file del quiz è presente, ma non può essere letto correttamente. Segnala il problema a chi gestisce il simulatore."
                    );
                }

                quizTitle = payload.title || "Simulatore Esame";
                quizData = Array.isArray(payload) ? payload : payload.questions;

                validateQuizData(quizData);
                quizData = quizData.map(shuffleQuestionOptions);

                answers = new Array(quizData.length).fill(null);

                document.title = quizTitle;
                document.getElementById("quiz-title").innerText = quizTitle;
                document.getElementById("result-quiz-title").innerText = quizTitle;

                currentQ = 0;
                showScreen("quiz-screen");
                setupTimer();
                loadQuestion();
                startTimerIfNeeded();
            } catch (error) {
                showError(error);
            }
        }

        function validateQuizData(data) {
            if (!Array.isArray(data) || data.length === 0) {
                throw new AppError(
                    "Batteria vuota",
                    "Questa batteria non contiene domande. Prova con un altro quiz o segnala il problema."
                );
            }

            data.forEach((item) => {
                const hasQuestion = typeof item.q === "string" && item.q.trim() !== "";
                const hasOptions = Array.isArray(item.o) && item.o.length > 0;
                const hasAnswer = Number.isInteger(item.a);

                if (!hasQuestion || !hasOptions || !hasAnswer || item.a < 0 || item.a >= item.o.length) {
                    throw new AppError(
                        "Batteria da correggere",
                        "Una o più domande non sono configurate correttamente. Segnala il problema a chi gestisce il simulatore."
                    );
                }
            });
        }


        function shuffleQuestionOptions(question) {
            const optionsWithOriginalIndex = question.o.map((text, originalIndex) => ({
                text,
                originalIndex
            }));

            shuffleArray(optionsWithOriginalIndex);

            const newCorrectIndex = optionsWithOriginalIndex.findIndex(item => item.originalIndex === question.a);

            return {
                ...question,
                o: optionsWithOriginalIndex.map(item => item.text),
                a: newCorrectIndex
            };
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const randomIndex = Math.floor(Math.random() * (i + 1));
                [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
            }

            return array;
        }

        function showScreen(id) {
            clearAutoAdvance();

            ["quiz-screen", "result-screen", "error-screen"].forEach(screenId => {
                document.getElementById(screenId).style.display = screenId === id ? "block" : "none";
            });
        }

        function loadQuestion() {
            clearAutoAdvance();

            document.getElementById("explanation").style.display = "none";
            document.getElementById("options-container").innerHTML = "";

            const qData = quizData[currentQ];
            const selectedAnswer = answers[currentQ];

            document.getElementById("topic-badge").innerText = qData.t || "Topic";
            document.getElementById("question-text").innerText = `${currentQ + 1}. ${qData.q}`;
            document.getElementById("progress").innerText = `Domanda ${currentQ + 1} di ${quizData.length}`;

            document.getElementById("prev-btn").disabled = currentQ === 0;
            document.getElementById("next-btn").innerHTML = currentQ === quizData.length - 1 ? "Termina Simulazione &#10004;" : "Avanti &#10140;";
            updateLiveScore();

            qData.o.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, qData.a, qData.e || "");
                document.getElementById("options-container").appendChild(btn);
            });

            if (selectedAnswer !== null) {
                showAnsweredState(selectedAnswer, qData.a, qData.e || "");
            }
        }


        function updateLiveScore() {
            const correctCount = document.getElementById("correct-count");
            const wrongCount = document.getElementById("wrong-count");

            if (!correctCount || !wrongCount) return;

            const correctAnswers = answers.reduce((total, answer, index) => {
                return total + (answer === quizData[index].a ? 1 : 0);
            }, 0);

            const wrongAnswers = answers.reduce((total, answer, index) => {
                return total + (answer !== null && answer !== quizData[index].a ? 1 : 0);
            }, 0);

            correctCount.innerText = correctAnswers;
            wrongCount.innerText = wrongAnswers;
        }

        function showAnsweredState(selectedIdx, correctIdx, explanation) {
            const buttons = document.getElementById("options-container").children;

            for (const b of buttons) {
                b.disabled = true;
            }

            if (selectedIdx === correctIdx) {
                buttons[selectedIdx].classList.add("correct");
            } else {
                buttons[selectedIdx].classList.add("wrong");
                buttons[correctIdx].classList.add("correct");
            }

            if (explanation) {
                const expBox = document.getElementById("explanation");
                expBox.innerHTML = `<strong>Spiegazione:</strong> ${escapeHtml(explanation)}`;
                expBox.style.display = "block";
            }
        }

        function checkAnswer(selectedIdx, correctIdx, explanation) {
            if (answers[currentQ] !== null) return;

            const answeredQuestionIndex = currentQ;
            answers[currentQ] = selectedIdx;
            showAnsweredState(selectedIdx, correctIdx, explanation);
            updateLiveScore();

            if (isAutoAdvanceEnabled()) {
                autoAdvanceTimer = setTimeout(() => {
                    if (currentQ === answeredQuestionIndex) {
                        nextQuestion();
                    }
                }, AUTO_ADVANCE_DELAY);
            }
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            clearAutoAdvance();
            currentQ++;

            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResult(false);
            }
        }

        function showResult(timeExpired = false) {
            clearAutoAdvance();
            stopTimer();

            const correctAnswers = answers.reduce((total, answer, index) => {
                return total + (answer === quizData[index].a ? 1 : 0);
            }, 0);
            const wrongAnswers = answers.filter((answer, index) => answer !== null && answer !== quizData[index].a).length;
            const unansweredQuestions = answers.filter(answer => answer === null).length;
            const score = correctAnswers * POINTS_PER_CORRECT_ANSWER;
            const maxScore = quizData.length * POINTS_PER_CORRECT_ANSWER;

            document.getElementById("result-title").innerText = timeExpired ? "Tempo scaduto!" : "Simulazione conclusa!";
            document.getElementById("final-score").innerText = `${formatScore(score)} / ${formatScore(maxScore)}`;
            document.getElementById("result-details").innerHTML = `
                Corrette: ${correctAnswers} · Errate: ${wrongAnswers} · Non date: ${unansweredQuestions}`;
            document.getElementById("time-result").innerText = isTimedQuiz
                ? `Tempo residuo: ${formatTime(remainingSeconds)}`
                : "";

            renderMistakesSummary();
            showScreen("result-screen");
        }

        function renderMistakesSummary() {
            const container = document.getElementById("mistakes-summary");
            const mistakes = quizData
                .map((question, index) => ({
                    question,
                    index,
                    givenIndex: answers[index],
                    correctIndex: question.a
                }))
                .filter(item => item.givenIndex !== item.correctIndex);

            if (mistakes.length === 0) {
                container.innerHTML = `
                    <h2>Resoconto errori</h2>
                    <div class="perfect-result">Nessun errore. Hai risposto correttamente a tutte le domande.</div>
                `;
                return;
            }

            const grouped = mistakes.reduce((acc, item) => {
                const topic = item.question.t || "Senza argomento";
                if (!acc[topic]) acc[topic] = [];
                acc[topic].push(item);
                return acc;
            }, {});

            const groupsHtml = Object.entries(grouped).map(([topic, items]) => `
                <div class="topic-group">
                    <h3>${escapeHtml(topic)} - ${items.length} ${items.length === 1 ? "errore" : "errori"}</h3>
                    ${items.map(item => renderMistakeCard(item)).join("")}
                </div>
            `).join("");

            container.innerHTML = `
                <h2>Resoconto errori</h2>
                ${groupsHtml}
            `;
        }

        function renderMistakeCard(item) {
            const question = item.question;
            const givenAnswer = item.givenIndex === null
                ? "Non risposta"
                : question.o[item.givenIndex];
            const correctAnswer = question.o[item.correctIndex];
            const explanation = question.e
                ? `<div class="mistake-explanation"><strong>Spiegazione:</strong> ${escapeHtml(question.e)}</div>`
                : "";

            return `
                <div class="mistake-card">
                    <div class="mistake-question">${item.index + 1}. ${escapeHtml(question.q)}</div>
                    <div class="answer-row given-answer"><strong>Risposta data:</strong> ${escapeHtml(givenAnswer)}</div>
                    <div class="answer-row correct-answer"><strong>Risposta corretta:</strong> ${escapeHtml(correctAnswer)}</div>
                    ${explanation}
                </div>
            `;
        }

        function showError(error) {
            const title = error instanceof AppError ? error.title : "Qualcosa è andato storto";
            const description = error instanceof AppError
                ? error.description
                : "Non è stato possibile aprire il quiz. Torna alla home e riprova.";

            document.getElementById("error-message").innerHTML = `
                <strong>${escapeHtml(title)}</strong>
                <span>${escapeHtml(description)}</span>
            `;

            showScreen("error-screen");
        }

        function setupTimer() {
            const timerBox = document.getElementById("timer-box");
            timerBox.style.display = isTimedQuiz ? "block" : "none";
            updateTimerDisplay();
        }

        function startTimerIfNeeded() {
            if (!isTimedQuiz) return;

            stopTimer();
            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateTimerDisplay();

                if (remainingSeconds <= 0) {
                    remainingSeconds = 0;
                    updateTimerDisplay();
                    showResult(true);
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const timerBox = document.getElementById("timer-box");
            const timerValue = document.getElementById("timer-value");

            if (!timerBox || !timerValue) return;

            timerValue.innerText = formatTime(remainingSeconds);
            timerBox.classList.toggle("warning", remainingSeconds <= 10 * 60 && remainingSeconds > 5 * 60);
            timerBox.classList.toggle("danger", remainingSeconds <= 5 * 60);
        }

        function formatScore(value) {
            return value.toFixed(2).replace(".", ",");
        }

        function formatTime(totalSeconds) {
            const safeSeconds = Math.max(0, totalSeconds);
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = safeSeconds % 60;
            return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
        }

        function setupAutoAdvancePreference() {
            const toggle = document.getElementById("auto-advance-toggle");
            if (!toggle) return;

            toggle.checked = localStorage.getItem(AUTO_ADVANCE_STORAGE_KEY) === "true";

            toggle.addEventListener("change", () => {
                localStorage.setItem(AUTO_ADVANCE_STORAGE_KEY, toggle.checked ? "true" : "false");
            });
        }

        function isAutoAdvanceEnabled() {
            return document.getElementById("auto-advance-toggle").checked;
        }

        function clearAutoAdvance() {
            if (autoAdvanceTimer) {
                clearTimeout(autoAdvanceTimer);
                autoAdvanceTimer = null;
            }
        }

        function goHome() {
            window.location.href = "./";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.onload = () => {
            setupAutoAdvancePreference();
            loadQuizFromJson();
        };
    </script>

</body>
