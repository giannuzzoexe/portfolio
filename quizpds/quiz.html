<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Esame</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        #app {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #1a73e8;
            margin-top: 0;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .auto-advance-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 0.95em;
            user-select: none;
        }

        .auto-advance-control input {
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            background: #1a73e8;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .question {
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options button {
            width: 100%;
            text-align: left;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options button:hover:not(:disabled) {
            background: #e8f0fe;
            border-color: #1a73e8;
        }

        .options button:disabled {
            cursor: not-allowed;
        }

        .correct {
            background: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
            font-weight: bold;
        }

        .wrong {
            background: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        #explanation {
            margin-top: 15px;
            padding: 15px;
            border-left: 5px solid #ffc107;
            background: #fff3cd;
            display: none;
            font-size: 0.95em;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.action-btn {
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
        }

        button.primary-btn {
            background: #1a73e8;
            color: white;
        }

        button.primary-btn:hover {
            background: #1557b0;
        }

        button.secondary-btn {
            background: #e8eaed;
            color: #333;
        }

        button.secondary-btn:hover:not(:disabled) {
            background: #dadce0;
        }

        button.secondary-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #progress {
            font-weight: bold;
            color: #666;
        }

        #quiz-screen,
        #result-screen,
        #error-screen {
            display: none;
        }

        #result-screen,
        #error-screen {
            text-align: center;
        }

        .score {
            font-size: 3em;
            color: #1a73e8;
            font-weight: bold;
            margin: 20px 0;
        }

        .error-box {
            text-align: left;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 16px;
            border-radius: 8px;
            line-height: 1.45;
            margin: 18px 0;
        }

        .error-box strong {
            display: block;
            margin-bottom: 6px;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            #app {
                padding: 20px;
            }

            .top-actions,
            .footer,
            .nav-actions,
            .result-actions {
                flex-direction: column;
                align-items: stretch;
            }

            button.action-btn {
                width: 100%;
            }

            .auto-advance-control {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="quiz-screen">
            <div class="top-actions">
                <button class="action-btn secondary-btn" onclick="goHome()">Torna alla Home</button>
                <label class="auto-advance-control" for="auto-advance-toggle">
                    <input type="checkbox" id="auto-advance-toggle">
                    Avanzamento automatico
                </label>
            </div>

            <h1 id="quiz-title">Simulazione Esame</h1>
            <div class="badge" id="topic-badge">Materia</div>
            <div class="question" id="question-text">Caricamento in corso...</div>
            <div class="options" id="options-container"></div>
            <div id="explanation"></div>

            <div class="footer">
                <span id="progress">Domanda 1</span>
                <div class="nav-actions">
                    <button class="action-btn secondary-btn" id="prev-btn" onclick="prevQuestion()">&#11013;
                        Indietro</button>
                    <button class="action-btn primary-btn" id="next-btn" onclick="nextQuestion()">Avanti
                        &#10140;</button>
                </div>
            </div>
        </div>

        <div id="result-screen">
            <h1>Quiz concluso!</h1>
            <p>Hai completato il quiz. Ecco il tuo risultato:</p>
            <div class="score" id="final-score">0 / 0</div>
            <div class="result-actions">
                <button class="action-btn primary-btn" onclick="location.reload()">Ripeti il Quiz</button>
                <button class="action-btn secondary-btn" onclick="goHome()">Torna alla Home</button>
            </div>
        </div>

        <div id="error-screen">
            <h1>Quiz non disponibile</h1>
            <div class="error-box" id="error-message"></div>
            <button class="action-btn secondary-btn" onclick="goHome()">Torna alla Home</button>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentQ = 0;
        let answers = [];
        let quizTitle = "Simulatore Esame";
        let autoAdvanceTimer = null;

        const allowedTypes = ["full", "cp", "cpp", "cds"];
        const AUTO_ADVANCE_DELAY = 1200;

        class AppError extends Error {
            constructor(title, description) {
                super(description);
                this.title = title;
                this.description = description;
            }
        }

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get("type");
            const id = params.get("id");

            if (!type || !id) {
                throw new AppError(
                    "Errore",
                    "Impossibile trovare il quiz. Torna alla home e seleziona una batteria dall'elenco."
                );
            }

            if (!allowedTypes.includes(type) || !/^\d+$/.test(id)) {
                throw new AppError(
                    "Link del quiz non valido",
                    "Il collegamento usato non corrisponde a una batteria disponibile. Torna alla home e scegli nuovamente il quiz."
                );
            }

            return { type, id };
        }

        async function loadQuizFromJson() {
            try {
                const { type, id } = getParams();
                const jsonPath = `${type}/${id}.json`;
                const response = await fetch(jsonPath, { cache: "no-store" });

                if (!response.ok) {
                    throw new AppError(
                        "Batteria non trovata",
                        "Questa batteria quiz non è disponibile. Potrebbe essere stata spostata, rinominata o non ancora caricata."
                    );
                }

                let payload;

                try {
                    payload = await response.json();
                } catch {
                    throw new AppError(
                        "Batteria non leggibile",
                        "Il file del quiz è presente, ma non può essere letto correttamente. Segnala il problema a chi gestisce il simulatore."
                    );
                }

                quizTitle = payload.title || "Simulatore Esame";
                quizData = Array.isArray(payload) ? payload : payload.questions;

                validateQuizData(quizData);

                answers = new Array(quizData.length).fill(null);

                document.title = quizTitle;
                document.getElementById("quiz-title").innerText = quizTitle;

                currentQ = 0;
                showScreen("quiz-screen");
                loadQuestion();
            } catch (error) {
                showError(error);
            }
        }

        function validateQuizData(data) {
            if (!Array.isArray(data) || data.length === 0) {
                throw new AppError(
                    "Batteria vuota",
                    "Questa batteria non contiene domande. Prova con un altro quiz o segnala il problema."
                );
            }

            data.forEach((item) => {
                const hasQuestion = typeof item.q === "string" && item.q.trim() !== "";
                const hasOptions = Array.isArray(item.o) && item.o.length > 0;
                const hasAnswer = Number.isInteger(item.a);

                if (!hasQuestion || !hasOptions || !hasAnswer || item.a < 0 || item.a >= item.o.length) {
                    throw new AppError(
                        "Batteria da correggere",
                        "Una o più domande non sono configurate correttamente. Segnala il problema a chi gestisce il simulatore."
                    );
                }
            });
        }

        function showScreen(id) {
            clearAutoAdvance();

            ["quiz-screen", "result-screen", "error-screen"].forEach(screenId => {
                document.getElementById(screenId).style.display = screenId === id ? "block" : "none";
            });
        }

        function loadQuestion() {
            clearAutoAdvance();

            document.getElementById("explanation").style.display = "none";
            document.getElementById("options-container").innerHTML = "";

            const qData = quizData[currentQ];
            const selectedAnswer = answers[currentQ];

            document.getElementById("topic-badge").innerText = qData.t || "Quiz";
            document.getElementById("question-text").innerText = `${currentQ + 1}. ${qData.q}`;
            document.getElementById("progress").innerText = `Domanda ${currentQ + 1} di ${quizData.length}`;

            document.getElementById("prev-btn").disabled = currentQ === 0;
            document.getElementById("next-btn").innerHTML = currentQ === quizData.length - 1 ? "Termina Quiz &#10004;" : "Avanti &#10140;";

            qData.o.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, qData.a, qData.e || "");
                document.getElementById("options-container").appendChild(btn);
            });

            if (selectedAnswer !== null) {
                showAnsweredState(selectedAnswer, qData.a, qData.e || "");
            }
        }

        function showAnsweredState(selectedIdx, correctIdx, explanation) {
            const buttons = document.getElementById("options-container").children;

            for (const b of buttons) {
                b.disabled = true;
            }

            if (selectedIdx === correctIdx) {
                buttons[selectedIdx].classList.add("correct");
            } else {
                buttons[selectedIdx].classList.add("wrong");
                buttons[correctIdx].classList.add("correct");
            }

            if (explanation) {
                const expBox = document.getElementById("explanation");
                expBox.innerHTML = `<strong>Spiegazione:</strong> ${escapeHtml(explanation)}`;
                expBox.style.display = "block";
            }
        }

        function checkAnswer(selectedIdx, correctIdx, explanation) {
            if (answers[currentQ] !== null) return;

            const answeredQuestionIndex = currentQ;
            answers[currentQ] = selectedIdx;
            showAnsweredState(selectedIdx, correctIdx, explanation);

            if (isAutoAdvanceEnabled()) {
                autoAdvanceTimer = setTimeout(() => {
                    if (currentQ === answeredQuestionIndex) {
                        nextQuestion();
                    }
                }, AUTO_ADVANCE_DELAY);
            }
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            clearAutoAdvance();
            currentQ++;

            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const score = answers.reduce((total, answer, index) => {
                return total + (answer === quizData[index].a ? 1 : 0);
            }, 0);

            document.getElementById("final-score").innerText = `${score} / ${quizData.length}`;
            showScreen("result-screen");
        }

        function showError(error) {
            const title = error instanceof AppError ? error.title : "Qualcosa è andato storto";
            const description = error instanceof AppError
                ? error.description
                : "Non è stato possibile aprire il quiz. Torna alla home e riprova.";

            document.getElementById("error-message").innerHTML = `
                <strong>${escapeHtml(title)}</strong>
                <span>${escapeHtml(description)}</span>
            `;

            showScreen("error-screen");
        }

        function isAutoAdvanceEnabled() {
            return document.getElementById("auto-advance-toggle").checked;
        }

        function clearAutoAdvance() {
            if (autoAdvanceTimer) {
                clearTimeout(autoAdvanceTimer);
                autoAdvanceTimer = null;
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.onload = loadQuizFromJson;
    </script>

</body>

</html>
