        let currentQ = 0;
        let answers = new Array(quizData.length).fill(null);

        function loadQuestion() {
            document.getElementById("explanation").style.display = "none";
            document.getElementById("options-container").innerHTML = "";

            let qData = quizData[currentQ];
            let selectedAnswer = answers[currentQ];

            document.getElementById("topic-badge").innerText = qData.t;
            document.getElementById("question-text").innerText = (currentQ + 1) + ". " + qData.q;
            document.getElementById("progress").innerText = "Domanda " + (currentQ + 1) + " di " + quizData.length;

            document.getElementById("prev-btn").disabled = currentQ === 0;
            document.getElementById("next-btn").innerHTML = currentQ === quizData.length - 1 ? "Termina Quiz &#10004;" : "Prossima Domanda &#10140;";

            qData.o.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, qData.a, qData.e);
                document.getElementById("options-container").appendChild(btn);
            });

            if (selectedAnswer !== null) {
                showAnsweredState(selectedAnswer, qData.a, qData.e);
            }
        }

        function showAnsweredState(selectedIdx, correctIdx, explanation) {
            let buttons = document.getElementById("options-container").children;
            for (let b of buttons) { b.disabled = true; } // Lock options

            if (selectedIdx === correctIdx) {
                buttons[selectedIdx].classList.add("correct");
            } else {
                buttons[selectedIdx].classList.add("wrong");
                buttons[correctIdx].classList.add("correct");
            }

            let expBox = document.getElementById("explanation");
            expBox.innerHTML = "<strong>Spiegazione:</strong> " + explanation;
            expBox.style.display = "block";
        }

        function checkAnswer(selectedIdx, correctIdx, explanation) {
            if (answers[currentQ] !== null) return;

            answers[currentQ] = selectedIdx;
            showAnsweredState(selectedIdx, correctIdx, explanation);
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let score = answers.reduce((total, answer, index) => {
                return total + (answer === quizData[index].a ? 1 : 0);
            }, 0);

            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = score + " / " + quizData.length;
        }

        // Start quiz
        window.onload = loadQuestion;
    </script>
